<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#0d1b2a"/>
  <!-- Tow truck body simplified -->
  <!-- Cab -->
  <rect x="8" y="28" width="18" height="14" rx="3" fill="#f5c518"/>
  <!-- Cab window -->
  <rect x="10" y="30" width="10" height="7" rx="2" fill="#0d1b2a" opacity="0.7"/>
  <!-- Truck bed / flatbed -->
  <rect x="26" y="32" width="30" height="8" rx="2" fill="#f5c518"/>
  <!-- Wheels -->
  <circle cx="15" cy="44" r="5" fill="#1a2d42" stroke="#f5c518" stroke-width="2"/>
  <circle cx="15" cy="44" r="2" fill="#f5c518"/>
  <circle cx="44" cy="44" r="5" fill="#1a2d42" stroke="#f5c518" stroke-width="2"/>
  <circle cx="44" cy="44" r="2" fill="#f5c518"/>
  <!-- Crane arm -->
  <rect x="50" y="18" width="4" height="16" rx="2" fill="#f5c518" transform="rotate(-20 52 26)"/>
  <!-- Hook -->
  <path d="M52 18 Q56 14 54 10 Q52 8 50 10" stroke="#f5c518" stroke-width="2" fill="none" stroke-linecap="round"/>
  <!-- Road line -->
  <rect x="4" y="50" width="56" height="3" rx="1.5" fill="#243b55"/>
  <rect x="14" y="51" width="8" height="1" rx="0.5" fill="#f5c518" opacity="0.6"/>
  <rect x="28" y="51" width="8" height="1" rx="0.5" fill="#f5c518" opacity="0.6"/>
  <rect x="42" y="51" width="8" height="1" rx="0.5" fill="#f5c518" opacity="0.6"/>
</svg>